<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1f3d2e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Coffee Terms" />
<meta name="description" content="A daily spaced-repetition trainer for coffee business vocabulary." />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="icons/icon-192.png" />
<title>Coffee Vocabulary Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --parchment: #f4ecd8;
    --parchment-dark: #e9dec2;
    --forest: #1f3d2e;
    --forest-light: #2c5240;
    --amber: #c9a227;
    --amber-dark: #a8841c;
    --ink: #2a2620;
    --red: #a13d2d;
    --green-ok: #3f6b3f;
    --card-shadow: 0 6px 20px rgba(31, 61, 46, 0.12);
    --border: rgba(31, 61, 46, 0.18);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    background: var(--parchment);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(201,162,39,0.06), transparent 45%),
      radial-gradient(circle at 90% 80%, rgba(31,61,46,0.05), transparent 45%);
    color: var(--ink);
    font-family: "DM Sans", sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .app {
    max-width: 560px;
    margin: 0 auto;
    padding: 20px 18px 40px;
    padding-top: calc(20px + env(safe-area-inset-top));
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header.top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  header.top h1 {
    font-family: "Playfair Display", serif;
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--forest);
    margin: 0;
  }

  header.top .tagline {
    font-family: "DM Mono", monospace;
    font-size: 0.68rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--amber-dark);
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 22px;
  }

  .stat {
    background: #fffdf7;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 10px;
    text-align: center;
    box-shadow: var(--card-shadow);
  }

  .stat .num {
    font-family: "Playfair Display", serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--forest);
    line-height: 1.1;
  }

  .stat .label {
    font-family: "DM Mono", monospace;
    font-size: 0.62rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #6b6455;
    margin-top: 3px;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .card {
    background: #fffdf7;
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--card-shadow);
    padding: 24px 20px;
    position: relative;
  }

  .category {
    font-family: "DM Mono", monospace;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--amber-dark);
    margin-bottom: 10px;
  }

  .box-track {
    display: flex;
    gap: 4px;
    margin-bottom: 18px;
  }

  .box-track .seg {
    flex: 1;
    height: 5px;
    border-radius: 3px;
    background: var(--border);
  }

  .box-track .seg.filled {
    background: var(--amber);
  }

  .question-stem {
    font-family: "DM Mono", monospace;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 8px;
  }

  .prompt {
    font-family: "Playfair Display", serif;
    font-size: 1.25rem;
    line-height: 1.5;
    color: var(--forest);
    margin-bottom: 22px;
  }

  .prompt .blank {
    display: inline-block;
    min-width: 90px;
    border-bottom: 2px solid var(--amber);
  }

  .mcq-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .mcq-option {
    text-align: left;
    background: var(--parchment);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 13px 15px;
    font-family: "DM Sans", sans-serif;
    font-size: 0.98rem;
    color: var(--ink);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .mcq-option:active {
    background: var(--parchment-dark);
  }

  .mcq-option.correct {
    background: rgba(63,107,63,0.15);
    border-color: var(--green-ok);
  }

  .mcq-option.incorrect {
    background: rgba(161,61,45,0.12);
    border-color: var(--red);
  }

  .mcq-option:disabled {
    cursor: default;
  }

  .cloze-input {
    width: 100%;
    font-family: "DM Sans", sans-serif;
    font-size: 1.05rem;
    padding: 13px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--parchment);
    color: var(--ink);
  }

  .cloze-input:focus {
    outline: none;
    border-color: var(--amber);
  }

  .cloze-input.correct {
    border-color: var(--green-ok);
    background: rgba(63,107,63,0.1);
  }

  .cloze-input.incorrect {
    border-color: var(--red);
    background: rgba(161,61,45,0.08);
  }

  .submit-btn, .next-btn, .primary-btn {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-family: "DM Sans", sans-serif;
    font-weight: 700;
    font-size: 1rem;
    background: var(--forest);
    color: var(--parchment);
    cursor: pointer;
  }

  .submit-btn:disabled {
    opacity: 0.4;
  }

  .submit-btn:active, .next-btn:active, .primary-btn:active {
    background: var(--forest-light);
  }

  .feedback {
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px dashed var(--border);
  }

  .feedback .verdict {
    font-family: "DM Mono", monospace;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 500;
  }

  .feedback .verdict.correct { color: var(--green-ok); }
  .feedback .verdict.incorrect { color: var(--red); }

  .feedback .answer-reveal {
    font-family: "DM Mono", monospace;
    font-size: 0.82rem;
    color: #6b6455;
    margin-bottom: 14px;
  }

  .feedback .term-name {
    font-family: "Playfair Display", serif;
    font-weight: 700;
    font-size: 1.15rem;
    color: var(--forest);
    margin-bottom: 8px;
  }

  .feedback .block {
    margin-bottom: 12px;
  }

  .feedback .block .tag {
    font-family: "DM Mono", monospace;
    font-size: 0.62rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--amber-dark);
    display: block;
    margin-bottom: 3px;
  }

  .feedback .block p {
    margin: 0;
    font-size: 0.95rem;
    line-height: 1.5;
  }

  .feedback .why p {
    font-style: italic;
  }

  .empty-state, .session-end {
    background: #fffdf7;
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--card-shadow);
    padding: 40px 24px;
    text-align: center;
    margin-top: 10%;
  }

  .empty-state .icon, .session-end .icon {
    font-size: 2.4rem;
    margin-bottom: 14px;
  }

  .empty-state h2, .session-end h2 {
    font-family: "Playfair Display", serif;
    color: var(--forest);
    margin: 0 0 10px;
    font-size: 1.3rem;
  }

  .empty-state p, .session-end p {
    font-size: 0.95rem;
    color: #5a5445;
    line-height: 1.55;
    margin: 0 0 6px;
  }

  .session-end .score {
    font-family: "Playfair Display", serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--amber-dark);
    margin: 14px 0;
  }

  .due-note {
    font-family: "DM Mono", monospace;
    font-size: 0.7rem;
    color: #8a8272;
    text-align: center;
    margin-top: 14px;
  }

  .progress-dots {
    display: flex;
    justify-content: center;
    gap: 5px;
    margin-bottom: 16px;
  }

  .progress-dots .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
  }

  .progress-dots .dot.done {
    background: var(--amber);
  }

  .install-hint {
    font-family: "DM Mono", monospace;
    font-size: 0.65rem;
    color: #8a8272;
    text-align: center;
    margin-top: 18px;
  }

  .stage-progress {
    font-family: "DM Mono", monospace;
    font-size: 0.68rem;
    letter-spacing: 0.03em;
    color: #8a8272;
    text-align: center;
    margin-bottom: 16px;
  }

  .home-actions {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .category-overview {
    margin-top: 26px;
    background: #fffdf7;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
  }

  .category-overview .overview-title {
    font-family: "DM Mono", monospace;
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--amber-dark);
    margin-bottom: 10px;
  }

  .category-overview ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .category-overview li {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
  }

  .category-overview li:last-child {
    border-bottom: none;
  }

  .category-overview .cat-name {
    color: var(--ink);
  }

  .category-overview li.locked .cat-name {
    color: #a39c8a;
  }

  .category-overview .cat-status {
    font-family: "DM Mono", monospace;
    font-size: 0.68rem;
    white-space: nowrap;
    color: var(--green-ok);
  }

  .category-overview li.locked .cat-status {
    color: #a39c8a;
  }

  .action-card {
    background: #fffdf7;
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--card-shadow);
    padding: 22px 20px;
    text-align: center;
  }

  .action-card.study {
    border-color: var(--amber);
  }

  .action-card .icon {
    font-size: 1.8rem;
    margin-bottom: 10px;
  }

  .action-card h2 {
    font-family: "Playfair Display", serif;
    color: var(--forest);
    margin: 0 0 8px;
    font-size: 1.2rem;
  }

  .action-card p {
    font-size: 0.9rem;
    color: #5a5445;
    line-height: 1.5;
    margin: 0 0 14px;
  }

  .btn-secondary {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: 1.5px solid var(--forest);
    background: transparent;
    color: var(--forest);
    font-family: "DM Sans", sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
  }

  .btn-secondary:active {
    background: rgba(31,61,46,0.08);
  }

  .study-sheet-header {
    margin-bottom: 18px;
  }

  .study-sheet-header .stage-label {
    font-family: "DM Mono", monospace;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--amber-dark);
    margin-bottom: 6px;
  }

  .study-sheet-header h2 {
    font-family: "Playfair Display", serif;
    color: var(--forest);
    font-size: 1.4rem;
    margin: 0 0 8px;
  }

  .study-sheet-header p {
    font-size: 0.92rem;
    color: #5a5445;
    line-height: 1.5;
    margin: 0;
  }

  .study-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 18px;
  }

  .study-item {
    background: #fffdf7;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 18px;
    box-shadow: var(--card-shadow);
  }

  .study-item .term-name {
    font-family: "Playfair Display", serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--forest);
    margin-bottom: 8px;
  }

  .study-item .block {
    margin-bottom: 10px;
  }

  .study-item .block:last-child {
    margin-bottom: 0;
  }

  .study-item .block .tag {
    font-family: "DM Mono", monospace;
    font-size: 0.6rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--amber-dark);
    display: block;
    margin-bottom: 3px;
  }

  .study-item .block p {
    margin: 0;
    font-size: 0.92rem;
    line-height: 1.5;
  }

  .study-item .why p {
    font-style: italic;
  }
</style>
</head>
<body>

<div class="app" id="app">
  <header class="top">
    <div>
      <h1>Coffee Terms</h1>
      <div class="tagline">Daily practice</div>
    </div>
  </header>

  <div class="stats-row">
    <div class="stat">
      <div class="num" id="stat-streak">0</div>
      <div class="label">Day streak</div>
    </div>
    <div class="stat">
      <div class="num" id="stat-mastered">0</div>
      <div class="label">Mastered</div>
    </div>
    <div class="stat">
      <div class="num" id="stat-due">0</div>
      <div class="label">Due now</div>
    </div>
  </div>

  <div class="stage-progress" id="stage-progress"></div>

  <main id="main"></main>
</div>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "coffee-vocab-progress-v1";
  var DECK_URL = "coffee-vocabulary-cards.json";
  var SESSION_CAP = 12;
  var BOX_INTERVALS = { 1: 1, 2: 2, 3: 4, 4: 7, 5: 14 };

  function todayStr() {
    var d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }

  function addDays(dateStr, days) {
    var d = new Date(dateStr + "T00:00:00");
    d.setDate(d.getDate() + days);
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }

  function daysBetween(a, b) {
    var da = new Date(a + "T00:00:00");
    var db = new Date(b + "T00:00:00");
    return Math.round((db - da) / 86400000);
  }

  function loadProgress() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (e) {
      return null;
    }
  }

  function saveProgress(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function normalize(str) {
    return String(str || "")
      .toLowerCase()
      .trim()
      .replace(/[.,/#!$%^&*;:{}=\-_`~()'"]/g, "")
      .replace(/\s+/g, " ");
  }

  function levenshtein(a, b) {
    var m = a.length, n = b.length;
    if (m === 0) return n;
    if (n === 0) return m;
    var prev = new Array(n + 1);
    var curr = new Array(n + 1);
    for (var j = 0; j <= n; j++) prev[j] = j;
    for (var i = 1; i <= m; i++) {
      curr[0] = i;
      for (var j2 = 1; j2 <= n; j2++) {
        var cost = a[i - 1] === b[j2 - 1] ? 0 : 1;
        curr[j2] = Math.min(prev[j2] + 1, curr[j2 - 1] + 1, prev[j2 - 1] + cost);
      }
      for (var k = 0; k <= n; k++) prev[k] = curr[k];
    }
    return prev[n];
  }

  function fuzzyMatch(userAnswer, correctTerm) {
    var u = normalize(userAnswer);
    var c = normalize(correctTerm);
    if (!u) return false;
    if (u === c) return true;
    // allow matching the acronym alone, e.g. "FPC" vs "FPC (Farmer Producer Company)"
    // — split the RAW term before normalize() strips the parentheses out.
    var cShort = normalize(String(correctTerm).split("(")[0]);
    if (u === cShort) return true;
    var maxLen = Math.max(u.length, c.length);
    var dist = levenshtein(u, c);
    var distShort = levenshtein(u, cShort);
    var threshold = maxLen <= 5 ? 0 : Math.max(1, Math.floor(maxLen * 0.15));
    var thresholdShort = cShort.length <= 5 ? 0 : Math.max(1, Math.floor(cShort.length * 0.15));
    return dist <= threshold || distShort <= thresholdShort;
  }

  function initState(deck, stages) {
    var existing = loadProgress();
    var isNewInstall = !existing;
    var state = existing || {
      cards: {},
      streak: 0,
      lastPracticeDate: null,
      totalReviews: 0,
      unlockedStages: []
    };
    var today = todayStr();

    if (!state.unlockedStages) {
      // Migrating progress saved before staged unlocking existed: a stage counts
      // as already-unlocked if any of its cards were already being tracked.
      state.unlockedStages = stages
        .filter(function (stage) {
          return stage.card_ids.some(function (id) { return !!state.cards[id]; });
        })
        .map(function (stage) { return stage.id; });
    }

    // Only auto-initialize cards belonging to already-unlocked stages (deck growth
    // within a studied stage). Cards in not-yet-unlocked stages wait until the
    // user studies that stage via the Study Sheet.
    var unlockedSet = {};
    state.unlockedStages.forEach(function (id) { unlockedSet[id] = true; });
    stages.forEach(function (stage) {
      if (!unlockedSet[stage.id]) return;
      stage.card_ids.forEach(function (id) {
        if (!state.cards[id]) {
          state.cards[id] = { box: 1, dueDate: today };
        }
      });
    });

    saveProgress(state);
    return state;
  }

  function getNextLockedStage(stages, state) {
    var unlockedSet = {};
    state.unlockedStages.forEach(function (id) { unlockedSet[id] = true; });
    for (var i = 0; i < stages.length; i++) {
      if (!unlockedSet[stages[i].id]) return stages[i];
    }
    return null;
  }

  function unlockedStageCount(stages, state) {
    var unlockedSet = {};
    state.unlockedStages.forEach(function (id) { unlockedSet[id] = true; });
    return stages.filter(function (s) { return unlockedSet[s.id]; }).length;
  }

  function getDueCards(deck, state) {
    var today = todayStr();
    return deck.filter(function (card) {
      var prog = state.cards[card.id];
      return prog && prog.dueDate <= today;
    });
  }

  function buildSessionQueue(deck, state) {
    var due = getDueCards(deck, state);
    due.sort(function (a, b) {
      return state.cards[a.id].box - state.cards[b.id].box;
    });
    return due.slice(0, SESSION_CAP);
  }

  function recordPractice(state) {
    var today = todayStr();
    if (state.lastPracticeDate === today) {
      // already counted today
    } else if (state.lastPracticeDate && daysBetween(state.lastPracticeDate, today) === 1) {
      state.streak += 1;
      state.lastPracticeDate = today;
    } else {
      state.streak = 1;
      state.lastPracticeDate = today;
    }
  }

  function masteredCount(state) {
    return Object.keys(state.cards).filter(function (id) {
      return state.cards[id].box === 5;
    }).length;
  }

  // ---------- App ----------

  var deck = [];
  var stages = [];
  var cardsById = {};
  var state = null;
  var queue = [];
  var queueIndex = 0;
  var sessionCorrect = 0;
  var sessionSeen = 0;

  var mainEl = document.getElementById("main");
  var statStreak = document.getElementById("stat-streak");
  var statMastered = document.getElementById("stat-mastered");
  var statDue = document.getElementById("stat-due");
  var stageProgressEl = document.getElementById("stage-progress");

  function refreshStats() {
    statStreak.textContent = state.streak;
    statMastered.textContent = masteredCount(state);
    statDue.textContent = getDueCards(deck, state).length;
    stageProgressEl.textContent = unlockedStageCount(stages, state) + " / " + stages.length + " stages unlocked";
  }

  function render() {
    refreshStats();
    if (queueIndex >= queue.length) {
      renderSessionEnd();
      return;
    }
    renderQuestion(queue[queueIndex]);
  }

  function dueCategoryBreakdown(due) {
    var counts = {};
    var order = [];
    due.forEach(function (card) {
      if (!counts[card.category]) { counts[card.category] = 0; order.push(card.category); }
      counts[card.category] += 1;
    });
    if (order.length === 1) {
      return "From " + order[0] + ".";
    }
    var parts = order.slice(0, 3).map(function (cat) { return cat + " (" + counts[cat] + ")"; });
    var suffix = order.length > 3 ? " and " + (order.length - 3) + " more" : "";
    return "From " + parts.join(", ") + suffix + ".";
  }

  function categoryOverviewHtml() {
    var unlockedSet = {};
    state.unlockedStages.forEach(function (id) { unlockedSet[id] = true; });
    var html = '<div class="category-overview">';
    html += '<div class="overview-title">All categories</div><ul>';
    stages.forEach(function (s) {
      var isUnlocked = !!unlockedSet[s.id];
      html += '<li class="' + (isUnlocked ? "unlocked" : "locked") + '">';
      html += '<span class="cat-name">' + escapeHtml(s.title) + "</span>";
      html += '<span class="cat-status">' + (isUnlocked ? "✓ unlocked" : "🔒 " + s.card_ids.length + " terms") + "</span>";
      html += "</li>";
    });
    html += "</ul></div>";
    return html;
  }

  function renderHome() {
    refreshStats();
    var due = getDueCards(deck, state);
    var nextStage = getNextLockedStage(stages, state);

    if (due.length === 0 && !nextStage) {
      renderAllDone(); // fully caught up + fully studied: reassuring empty state
      return;
    }

    var html = '<div class="home-actions">';

    if (due.length > 0) {
      html += '<div class="action-card">';
      html += '<div class="icon">☕</div>';
      html += "<h2>" + due.length + " term" + (due.length === 1 ? "" : "s") + " due for review</h2>";
      html += "<p>" + escapeHtml(dueCategoryBreakdown(due)) + "</p>";
      html += '<button class="primary-btn" id="start-review-btn">Review now</button>';
      html += "</div>";
    }

    if (nextStage) {
      html += '<div class="action-card study">';
      html += '<div class="icon">📖</div>';
      html += "<h2>New stage: " + escapeHtml(nextStage.title) + "</h2>";
      html += "<p>" + escapeHtml(nextStage.blurb) + " (" + nextStage.card_ids.length + " terms)</p>";
      html += '<button class="' + (due.length > 0 ? "btn-secondary" : "primary-btn") + '" id="start-study-btn">Study this stage</button>';
      html += "</div>";
    }

    html += "</div>";
    html += categoryOverviewHtml();
    mainEl.innerHTML = html;

    var reviewBtn = document.getElementById("start-review-btn");
    if (reviewBtn) reviewBtn.addEventListener("click", startReviewSession);
    var studyBtn = document.getElementById("start-study-btn");
    if (studyBtn) studyBtn.addEventListener("click", function () { renderStudySheet(nextStage); });
  }

  function startReviewSession() {
    queue = buildSessionQueue(deck, state);
    queueIndex = 0;
    sessionCorrect = 0;
    sessionSeen = 0;
    render();
  }

  function renderStudySheet(stage) {
    var html = '<div class="study-sheet-header">';
    html += '<div class="stage-label">Stage ' + (stages.indexOf(stage) + 1) + " of " + stages.length + "</div>";
    html += "<h2>" + escapeHtml(stage.title) + "</h2>";
    html += "<p>" + escapeHtml(stage.blurb) + " Read through these first — you'll be quizzed on exactly these terms right after.</p>";
    html += "</div>";

    html += '<div class="study-list">';
    stage.card_ids.forEach(function (id) {
      var card = cardsById[id];
      if (!card) return;
      html += '<div class="study-item">';
      html += '<div class="term-name">' + escapeHtml(card.term) + "</div>";
      html += '<div class="block"><span class="tag">Definition</span><p>' + escapeHtml(card.definition) + "</p></div>";
      html += '<div class="block"><span class="tag">Think of it like</span><p>' + escapeHtml(card.analogy) + "</p></div>";
      html += '<div class="block why"><span class="tag">Why it matters</span><p>' + escapeHtml(card.why_it_matters) + "</p></div>";
      html += "</div>";
    });
    html += "</div>";

    html += '<button class="primary-btn" id="start-stage-quiz-btn">Start quiz on these ' + stage.card_ids.length + ' terms</button>';

    mainEl.innerHTML = html;
    mainEl.scrollIntoView({ behavior: "smooth", block: "start" });

    document.getElementById("start-stage-quiz-btn").addEventListener("click", function () {
      unlockStage(stage);
      queue = stage.card_ids.map(function (id) { return cardsById[id]; }).filter(Boolean);
      queueIndex = 0;
      sessionCorrect = 0;
      sessionSeen = 0;
      render();
    });
  }

  function unlockStage(stage) {
    var today = todayStr();
    if (state.unlockedStages.indexOf(stage.id) === -1) {
      state.unlockedStages.push(stage.id);
    }
    stage.card_ids.forEach(function (id) {
      if (!state.cards[id]) {
        state.cards[id] = { box: 1, dueDate: today };
      }
    });
    saveProgress(state);
  }

  function boxTrackHtml(box) {
    var segs = "";
    for (var i = 1; i <= 5; i++) {
      segs += '<div class="seg' + (i <= box ? " filled" : "") + '"></div>';
    }
    return '<div class="box-track">' + segs + "</div>";
  }

  function progressDotsHtml() {
    var dots = "";
    var total = queue.length;
    for (var i = 0; i < total; i++) {
      dots += '<div class="dot' + (i < queueIndex ? " done" : "") + '"></div>';
    }
    return '<div class="progress-dots">' + dots + "</div>";
  }

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function renderQuestion(card) {
    var prog = state.cards[card.id];
    var box = prog.box;
    var isMcq = box === 1;

    var html = '<div class="card">';
    html += progressDotsHtml();
    html += '<div class="category">' + escapeHtml(card.category) + "</div>";
    html += boxTrackHtml(box);

    if (isMcq) {
      html += '<div class="question-stem">Which term matches this definition?</div>';
      html += '<div class="prompt">' + escapeHtml(card.definition) + "</div>";
      html += '<div class="mcq-options" id="mcq-options">';
      var options = shuffle(card.mcq_options);
      options.forEach(function (opt, i) {
        html += '<button class="mcq-option" data-option="' + escapeHtml(opt).replace(/"/g, "&quot;") + '" data-idx="' + i + '">' + escapeHtml(opt) + "</button>";
      });
      html += "</div>";
    } else {
      html += '<div class="question-stem">Fill in the blank</div>';
      var clozeParts = card.cloze.split("___");
      var clozeHtml = escapeHtml(clozeParts[0] || "") + '<span class="blank"></span>' + escapeHtml(clozeParts[1] || "");
      html += '<div class="prompt">' + clozeHtml + "</div>";
      html += '<input type="text" class="cloze-input" id="cloze-input" placeholder="Type the term…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />';
      html += '<button class="submit-btn" id="submit-btn" disabled>Check</button>';
    }

    html += '<div id="feedback-slot"></div>';
    html += "</div>";
    html += '<div class="due-note">' + (queue.length - queueIndex - 1 > 0 ? (queue.length - queueIndex - 1) + " more after this" : "Last card in today's session") + "</div>";

    mainEl.innerHTML = html;

    if (isMcq) {
      var buttons = mainEl.querySelectorAll(".mcq-option");
      buttons.forEach(function (btn) {
        btn.addEventListener("click", function () {
          handleMcqAnswer(card, btn, buttons);
        });
      });
    } else {
      var input = document.getElementById("cloze-input");
      var submitBtn = document.getElementById("submit-btn");
      input.addEventListener("input", function () {
        submitBtn.disabled = input.value.trim().length === 0;
      });
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !submitBtn.disabled) {
          handleClozeAnswer(card, input, submitBtn);
        }
      });
      submitBtn.addEventListener("click", function () {
        handleClozeAnswer(card, input, submitBtn);
      });
      setTimeout(function () { input.focus(); }, 50);
    }
  }

  function correctAnswer(card) {
    // mcq_options[0] is the canonical quizzable answer (matches the cloze blank).
    // card.term is sometimes a broader display label, e.g. a 4-stage chain or
    // grouped concept, so it isn't always the literal right answer to grade against.
    return card.mcq_options[0];
  }

  function handleMcqAnswer(card, chosenBtn, allButtons) {
    var chosen = chosenBtn.getAttribute("data-option");
    var correct = correctAnswer(card);
    var isCorrect = chosen === correct;
    allButtons.forEach(function (btn) {
      btn.disabled = true;
      var val = btn.getAttribute("data-option");
      if (val === correct) btn.classList.add("correct");
      else if (btn === chosenBtn) btn.classList.add("incorrect");
    });
    settleAnswer(card, isCorrect);
  }

  function handleClozeAnswer(card, input, submitBtn) {
    if (submitBtn.disabled) return;
    var isCorrect = fuzzyMatch(input.value, correctAnswer(card));
    input.disabled = true;
    submitBtn.disabled = true;
    submitBtn.style.display = "none";
    input.classList.add(isCorrect ? "correct" : "incorrect");
    settleAnswer(card, isCorrect);
  }

  function settleAnswer(card, isCorrect) {
    var prog = state.cards[card.id];
    var today = todayStr();

    if (isCorrect) {
      prog.box = Math.min(5, prog.box + 1);
      sessionCorrect += 1;
    } else {
      prog.box = 1;
    }
    prog.dueDate = addDays(today, BOX_INTERVALS[prog.box]);

    sessionSeen += 1;
    state.totalReviews += 1;
    recordPractice(state);
    saveProgress(state);

    renderFeedback(card, isCorrect);
    refreshStats();
  }

  function renderFeedback(card, isCorrect) {
    var slot = document.getElementById("feedback-slot");
    var html = '<div class="feedback">';
    html += '<div class="verdict ' + (isCorrect ? "correct" : "incorrect") + '">' + (isCorrect ? "✓ Correct" : "✗ Not quite") + "</div>";
    if (!isCorrect) {
      html += '<div class="answer-reveal">Answer: ' + escapeHtml(correctAnswer(card)) + "</div>";
    }
    html += '<div class="term-name">' + escapeHtml(card.term) + "</div>";
    html += '<div class="block"><span class="tag">Definition</span><p>' + escapeHtml(card.definition) + "</p></div>";
    html += '<div class="block"><span class="tag">Think of it like</span><p>' + escapeHtml(card.analogy) + "</p></div>";
    html += '<div class="block why"><span class="tag">Why it matters to you</span><p>' + escapeHtml(card.why_it_matters) + "</p></div>";
    html += '<button class="next-btn" id="next-btn">Next</button>';
    html += "</div>";
    slot.innerHTML = html;
    document.getElementById("next-btn").addEventListener("click", function () {
      queueIndex += 1;
      render();
    });
    slot.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  function renderSessionEnd() {
    var dueRemaining = getDueCards(deck, state).length;
    var nextStage = getNextLockedStage(stages, state);
    var html = '<div class="session-end">';
    html += '<div class="icon">☕</div>';
    html += "<h2>Session complete</h2>";
    html += '<div class="score">' + sessionCorrect + " / " + sessionSeen + "</div>";
    html += "<p>Nicely done. Come back tomorrow — the schedule will bring back exactly the terms you need to see next.</p>";
    if (dueRemaining > 0) {
      html += "<p>(" + dueRemaining + " more were due today beyond today's cap — they'll carry forward, nothing is lost.)</p>";
    } else if (nextStage) {
      html += "<p>Ready for another stage whenever you are.</p>";
    }
    html += '<button class="primary-btn" id="continue-btn">Continue</button>';
    html += "</div>";
    mainEl.innerHTML = html;
    document.getElementById("continue-btn").addEventListener("click", renderHome);
  }

  function renderAllDone() {
    var html = '<div class="session-end">';
    html += '<div class="icon">☕</div>';
    html += "<h2>All caught up</h2>";
    html += "<p>Every stage is unlocked and nothing is due right now — your schedule is working exactly as it should. Check back tomorrow for the next batch.</p>";
    html += "</div>";
    mainEl.innerHTML = html;
  }

  function boot() {
    fetch(DECK_URL)
      .then(function (res) { return res.json(); })
      .then(function (data) {
        deck = data.cards;
        stages = data.stages || [];
        cardsById = {};
        deck.forEach(function (card) { cardsById[card.id] = card; });
        state = initState(deck, stages);
        renderHome();
      })
      .catch(function (err) {
        mainEl.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h2>Could not load the deck</h2><p>' + escapeHtml(String(err)) + "</p></div>";
      });
  }

  boot();

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
})();
</script>
</body>
</html>
